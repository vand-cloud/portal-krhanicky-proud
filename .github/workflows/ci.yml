name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: dummy
      NEXT_PUBLIC_SANITY_DATASET: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        # Node 24 to match Vercel build env (project nodeVersion=24.x) and local
        # dev (node 24, npm 11). Keeping the runtime version in sync prevents
        # npm-version-induced lockfile mismatches.
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        # npm install (not ci) — npm 11 doesn't store cross-platform optional
        # deps (@esbuild/linux-*, fsevents on Linux) when locked from macOS,
        # so npm ci fails on Linux runners with EUSAGE. install tolerates
        # the diff and resolves missing optionals from registry.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright + axe)
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
