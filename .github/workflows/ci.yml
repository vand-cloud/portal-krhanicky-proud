name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # Backstop: if any step wedges (e.g. a stalled browser download), fail in
    # minutes instead of holding a runner until GitHub's 6h ceiling.
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: dummy
      NEXT_PUBLIC_SANITY_DATASET: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        # Node 24 to match Vercel build env (project nodeVersion=24.x) and local
        # dev (node 24, npm 11). Keeping the runtime version in sync prevents
        # npm-version-induced lockfile mismatches.
        uses: actions/setup-node@v4
        with:
          # Pinned to 24.15.0: Node 24.16.0 ships an extract-zip/yauzl
          # regression that makes `playwright install` hang forever right after
          # the browser download reaches 100% (microsoft/playwright#41000).
          # Still Node 24.x, so it matches Vercel's build env. Can revert to a
          # floating "24" once Playwright >=1.60 (which fixes the hang) is in.
          node-version: 24.15.0
          cache: npm

      - name: Install dependencies
        # npm install (not ci) — npm 11 doesn't store cross-platform optional
        # deps (@esbuild/linux-*, fsevents on Linux) when locked from macOS,
        # so npm ci fails on Linux runners with EUSAGE. install tolerates
        # the diff and resolves missing optionals from registry.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Install Playwright browsers
        # Playwright's installer has no internal timeout: it can download the
        # first artifact to 100% and then stall indefinitely on the next CDN
        # fetch, wedging the job until the job timeout fires. Wrap each attempt
        # in a hard timeout and retry; already-downloaded artifacts are cached,
        # so a retry only re-fetches whatever stalled.
        run: |
          for attempt in 1 2 3; do
            echo "Playwright install attempt $attempt"
            if timeout 240 npx playwright install --with-deps chromium; then
              exit 0
            fi
            echo "::warning::Playwright install attempt $attempt stalled or timed out; retrying"
          done
          echo "::error::Playwright install failed after 3 attempts"
          exit 1

      - name: E2E tests (Playwright + axe)
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
